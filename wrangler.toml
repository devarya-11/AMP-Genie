# Cloudflare Pages config for AMP Genie.
#
# Static assets live in web/ (pages_build_output_dir); the backend is the
# functions/ directory (file-based routing -> /generate, /brand, /validate,
# /dispatch, /history, /api/meta). nodejs_compat lets the reused CommonJS
# server modules run on the Workers runtime.
#
# Local dev needs no Cloudflare login:
#   npx wrangler pages dev --kv HISTORY --port 8788
# (--kv gives a local, in-memory HISTORY namespace so history works offline.)
#
# For a real deploy, create the KV namespace once (after `wrangler login`):
#   npx wrangler kv namespace create HISTORY
# then paste the returned id below and run `npx wrangler pages deploy`.

name = "amp-genie"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "web"

# Build history. id points at the "amp-genie-history" KV namespace created in
# this account; local `wrangler pages dev --kv HISTORY` simulates it in memory.
[[kv_namespaces]]
binding = "HISTORY"
id = "45848d264860419eae8c4869900eff10"

# Genie 2.0 system of record on Cloudflare D1 (SQLite over HTTP). The Pages
# Functions reach it as env.DB; functions/_lib/genie.js builds the repo via
# createD1Db(env.DB) whenever Supabase is not configured. Schema lives in
# migrations/0001_init.sql (apply with `wrangler d1 execute amp-genie-db
# --remote --file=migrations/0001_init.sql`). Local `wrangler pages dev` gets a
# throwaway in-memory D1 unless --d1 DB=<id> is passed.
[[d1_databases]]
binding = "DB"
database_name = "amp-genie-db"
database_id = "71b354a8-bd3e-486f-92f7-5e0b0b3aafa9"

# Uploaded brand-picture bytes. Deliberately UNBOUND for now: R2 is not enabled
# on this account, and uploadBrandImageH falls back to the KV byte store when the
# UPLOADS binding is absent (r2 || kv → kv). server/asset-store.js stores the raw
# image under 'assetbytes:<id>' in KV (env.HISTORY) and GET /brand-images/:id
# streams it back — so the upload feature works fully on the free KV tier with no
# R2. The R2-aware code path stays in place, dormant, ready to switch on later.
#
# To move the bytes to R2 (proper object storage, no 25MB KV value cap): enable
# R2 in the Cloudflare dashboard, then
#   npx wrangler r2 bucket create amp-genie-assets
# and restore the binding below (NB: 'ASSETS' is a RESERVED name in Pages — the
# internal static-asset fetcher — so the binding must be UPLOADS, not ASSETS):
#   [[r2_buckets]]
#   binding = "UPLOADS"
#   bucket_name = "amp-genie-assets"
# Local with R2: `wrangler pages dev --r2 UPLOADS`.
