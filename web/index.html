<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AMP Genie</title>
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<!-- SVG icon library — every chrome icon is inline SVG, never a Unicode glyph. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-lamp" viewBox="0 0 24 24">
    <path fill="currentColor" d="M5 14c0-3.9 3.1-7 7-7 2.8 0 5 1.6 6.2 4l3.3-1.1.5 1.5-3.3 1.1c.2.7.3 1.4.3 2.1H5zm-1 2h16v2H4zm3 3h10l-1 2H8z"/>
    <circle cx="12" cy="4" r="1.6" fill="currentColor"/>
  </symbol>
  <symbol id="i-sparkle" viewBox="0 0 24 24">
    <path fill="currentColor" d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8z M19 14l.9 2.6L22 17.5l-2.1.9L19 21l-.9-2.6L16 17.5l2.1-.9z"/>
  </symbol>
  <symbol id="i-star" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2l3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1z"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2.5" d="M4 12.5l5 5 11-11"/></symbol>
  <symbol id="i-cross" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2.5" d="M5 5l14 14M19 5L5 19"/></symbol>
  <symbol id="i-copy" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" d="M9 9h10v10H9zM5 15V5h10"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" d="M12 3v12m-5-5l5 5 5-5M4 20h16"/></symbol>
  <symbol id="i-refresh" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" d="M20 11a8 8 0 10-2 5m2 4v-5h-5"/></symbol>
  <symbol id="i-send" viewBox="0 0 24 24"><path fill="currentColor" d="M3 11l18-8-8 18-2-7z"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2"/><path stroke="currentColor" stroke-width="2" d="M16 16l4 4"/></symbol>
  <symbol id="i-chevron" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></symbol>
</svg>

<header class="topbar">
  <div class="brandmark"><svg class="ic lampic"><use href="#i-lamp"/></svg><span>AMP&nbsp;Genie</span></div>
  <div class="tagline">Type a brand &rarr; a validated, interactive AMP email</div>
  <label class="devtoggle" title="Show the AMP code &amp; Validation tabs for debugging">
    <input type="checkbox" id="devToggle" class="devtoggle-input">
    <span class="devtoggle-track"><span class="devtoggle-thumb"></span></span>
    <span class="devtoggle-text">Developer view</span>
  </label>
</header>

<main>
  <!-- HERO -->
  <section class="hero card">
    <label class="fieldlabel" for="brand">Brand name</label>
    <div class="hero-input-row">
      <input id="brand" type="text" placeholder="e.g. Zomato, Nykaa, Groww&hellip;" autocomplete="off">
      <button id="rub" class="primary big"><svg class="ic"><use href="#i-lamp"/></svg> Rub the <span class="cursive-l">l</span>AMP</button>
    </div>

    <div class="controls">
      <div class="ctrl">
        <label for="colorhex">Brand colour <span class="hint">auto-detected &mdash; override optional</span></label>
        <div class="colorwrap">
          <input id="colorpick" type="color" value="#6c2bd9">
          <input id="colorhex" type="text" placeholder="auto" maxlength="7">
        </div>
      </div>
    </div>

    <div class="brief-field">
      <label class="fieldlabel" for="campaignBrief">Tell us about this campaign <span class="hint">optional</span></label>
      <textarea id="campaignBrief" rows="5" placeholder="What&rsquo;s this campaign for? Include the use case, what it should do, how the flow should work, and anything it needs to connect to (e.g. your CRM, loyalty program, a specific API)."></textarea>
      <div class="brief-meta">
        <span id="briefCount" class="brief-count">0/2000</span>
        <span id="briefWarn" class="brief-warn hidden">Over 2000 characters &mdash; trim it down to Rub the lAMP. Nothing you&rsquo;ve typed is lost.</span>
      </div>
    </div>

    <div id="status" class="statusline"></div>
  </section>

  <!-- RESULT -->
  <section id="result" class="result hidden">
    <!-- LEFT RAIL -->
    <aside class="rail card">
      <div id="conjured" class="conjured"></div>
      <div id="chips" class="chips"></div>
      <div id="briefNote" class="brief-note hidden"></div>

      <div class="rail-actions">
        <button id="surprise" class="ghost"><svg class="ic"><use href="#i-refresh"/></svg> Surprise me again</button>
        <button id="copy" class="ghost"><svg class="ic"><use href="#i-copy"/></svg> Copy AMP code</button>
        <button id="download" class="ghost"><svg class="ic"><use href="#i-download"/></svg> Download .html</button>
      </div>
      <div id="copyMsg" class="copy-msg" aria-live="polite"></div>

      <div class="dispatch">
        <label class="fieldlabel" for="dispatchTo">Send to your inbox <span class="hint">self-send renders AMP without Google registration</span></label>
        <div class="dispatch-row">
          <input id="dispatchTo" type="email" placeholder="you@gmail.com">
          <button id="dispatch" class="primary"><svg class="ic"><use href="#i-send"/></svg></button>
        </div>
        <div id="dispatchMsg" class="dispatch-msg" aria-live="polite"></div>
      </div>
    </aside>

    <!-- RIGHT TABS -->
    <div class="panel card">
      <nav class="tabs">
        <button data-tab="preview" class="on" type="button">Live preview</button>
        <button data-tab="code" type="button" class="advanced-only">AMP code <span id="editedDot" class="editdot hidden"></span></button>
        <button data-tab="validation" type="button" class="advanced-only">Validation <span id="valDot" class="statdot"></span></button>
      </nav>

      <div data-pane="preview" class="pane on">
        <div class="stage">
          <div class="phone"><div id="previewArea" class="phone-screen"></div></div>
        </div>
      </div>

      <div data-pane="code" class="pane advanced-only">
        <div class="code-actions">
          <button id="revalidate" class="primary sm"><svg class="ic"><use href="#i-check"/></svg> Re-validate</button>
          <button id="resetCode" class="ghost sm"><svg class="ic"><use href="#i-refresh"/></svg> Reset</button>
          <span id="editedLabel" class="edited hidden">edited &mdash; differs from generated</span>
        </div>
        <textarea id="code" spellcheck="false"></textarea>
      </div>

      <div data-pane="validation" class="pane advanced-only">
        <div id="verdict" class="verdict"></div>
        <a id="playground" class="pglink" href="https://amp.gmail.dev/playground/" target="_blank" rel="noopener">Open in AMP Playground &rarr;</a>
        <ul id="errors" class="errlist"></ul>
      </div>
    </div>
  </section>

  <!-- HISTORY: collapsed by default (Phase 7) — available one click away
       rather than permanently taking up space in the default, minimal view. -->
  <section id="historySection" class="history card hidden">
    <button type="button" id="historyToggle" class="history-hdr" aria-expanded="false" aria-controls="historyList">
      <svg class="ic history-chevron" aria-hidden="true"><use href="#i-chevron"/></svg>
      <h2 class="history-title">Recent builds</h2>
      <span class="hint">brief &amp; metadata from past generations, for review &mdash; read-only</span>
    </button>
    <div id="historyList" class="history-list hidden"></div>
  </section>
</main>

<script src="preview.js?v=3"></script>
<script src="app.js?v=3"></script>
</body>
</html>
